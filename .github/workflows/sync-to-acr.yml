name: Sync Image To Aliyun ACR

on:
  push:
    tags:
      - '-*'
  workflow_dispatch:
    inputs:
      task:
        description: '任务名，对应 .github/image-sync-tasks.json 的 key，例如 n8n'
        required: true
        type: string

jobs:
  sync-to-aliyun:
    if: ${{ vars.PUBLISH_ALIYUN == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
      ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
      ALIYUN_USERNAME: ${{ secrets.ALIYUN_USERNAME }}
      ALIYUN_PASSWORD: ${{ secrets.ALIYUN_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Resolve task key
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK_KEY="${{ inputs.task }}"
            RAW_TAG="manual-${TASK_KEY}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
            TASK_KEY="${RAW_TAG#-}"
          fi

          if [ -z "$TASK_KEY" ]; then
            echo "任务名为空，无法继续。"
            exit 1
          fi

          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "TASK_KEY=$TASK_KEY" >> "$GITHUB_ENV"
          echo "触发任务: $TASK_KEY"

      - name: Validate config and load task
        shell: bash
        run: |
          set -euo pipefail

          test -n "$ALIYUN_REGISTRY" || { echo '缺少 vars.ALIYUN_REGISTRY'; exit 1; }
          test -n "$ALIYUN_NAMESPACE" || { echo '缺少 vars.ALIYUN_NAMESPACE'; exit 1; }
          test -n "$ALIYUN_USERNAME" || { echo '缺少 secrets.ALIYUN_USERNAME'; exit 1; }
          test -n "$ALIYUN_PASSWORD" || { echo '缺少 secrets.ALIYUN_PASSWORD'; exit 1; }
          test -f .github/image-sync-tasks.json || { echo '.github/image-sync-tasks.json 不存在'; exit 1; }

          TASK_JSON=$(jq -c --arg key "$TASK_KEY" '.[$key]' .github/image-sync-tasks.json)
          if [ -z "$TASK_JSON" ] || [ "$TASK_JSON" = "null" ]; then
            echo "未找到任务: $TASK_KEY"
            echo '可用任务列表:'
            jq -r 'keys[]' .github/image-sync-tasks.json
            exit 1
          fi

          SRC_IMAGE=$(echo "$TASK_JSON" | jq -r '.source')
          TARGET_REPO=$(echo "$TASK_JSON" | jq -r '.target_repo')
          TARGET_TAG=$(echo "$TASK_JSON" | jq -r '.target_tag')

          test -n "$SRC_IMAGE" && [ "$SRC_IMAGE" != "null" ] || { echo 'source 未配置'; exit 1; }
          test -n "$TARGET_REPO" && [ "$TARGET_REPO" != "null" ] || { echo 'target_repo 未配置'; exit 1; }
          test -n "$TARGET_TAG" && [ "$TARGET_TAG" != "null" ] || { echo 'target_tag 未配置'; exit 1; }

          TARGET_IMAGE="${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/${TARGET_REPO}:${TARGET_TAG}"

          echo "SRC_IMAGE=$SRC_IMAGE" >> "$GITHUB_ENV"
          echo "TARGET_IMAGE=$TARGET_IMAGE" >> "$GITHUB_ENV"
          echo "源镜像: $SRC_IMAGE"
          echo "目标镜像: $TARGET_IMAGE"

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$DOCKERHUB_TOKEN" | skopeo login docker.io --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Login to Aliyun ACR
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$ALIYUN_PASSWORD" | skopeo login "$ALIYUN_REGISTRY" --username "$ALIYUN_USERNAME" --password-stdin

      - name: Inspect source image manifest
        shell: bash
        run: |
          set -euo pipefail
          skopeo inspect --raw "docker://$SRC_IMAGE" > manifest.json
          echo 'Manifest mediaType:'
          jq -r '.mediaType // "unknown"' manifest.json
          echo 'Manifest platforms:'
          jq -r '.manifests[]?.platform | "- \(.os)/\(.architecture)\((.variant // "") | if . == "" then "" else "/" + . end)"' manifest.json || true

      - name: Sync image to Aliyun ACR
        shell: bash
        run: |
          set -euo pipefail
          skopeo copy --all --retry-times 3 "docker://$SRC_IMAGE" "docker://$TARGET_IMAGE"

      - name: Summary
        shell: bash
        run: |
          echo "同步完成: $SRC_IMAGE -> $TARGET_IMAGE"
